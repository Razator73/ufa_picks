<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: Arial, sans-serif; color: #333; max-width: 600px; margin: 0 auto; }
    .password-box { background: #f5f5f5; border: 1px solid #ddd; border-radius: 6px; padding: 16px; font-size: 20px; font-family: monospace; letter-spacing: 2px; margin: 16px 0; }
  </style>
</head>
<body>
  <h2>UFA Picks — Password Reset</h2>
  <p>Hi {{ user.first_name }},</p>
  <p>A temporary password has been set for your UFA Picks account (<strong>{{ user.username }}</strong>):</p>
  <div class="password-box">{{ temp_password }}</div>
  <p>You will be prompted to set a new password when you log in.</p>
  <p>If you didn't request this, you can ignore this email.</p>
</body>
</html>
